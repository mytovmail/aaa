<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כיבוש טריטוריה - PRO FIX</title>
    <style>
        body {
            margin: 0;
            background-color: #0f172a;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* מונע בעיות במגע במכשירים מסוימים */
        }

        #stats {
            display: flex;
            gap: 40px;
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 800;
            background: rgba(255,255,255,0.05);
            padding: 10px 30px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }

        .p1-text { color: #38bdf8; text-shadow: 0 0 10px #0ea5e9; }
        .p2-text { color: #fb7185; text-shadow: 0 0 10px #e11d48; }

        #canvas-container {
            position: relative;
            padding: 10px;
            background: #1e293b;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            background-color: #020617;
            border-radius: 4px;
            outline: none; /* מסיר מסגרת פוקוס מכוערת */
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 40px;
            font-size: 14px;
            opacity: 0.8;
            background: rgba(255,255,255,0.05);
            padding: 8px 20px;
            border-radius: 20px;
        }

        .kbd {
            background: #334155;
            padding: 3px 8px;
            border-radius: 5px;
            font-weight: bold;
            color: #f8fafc;
        }

        #timer {
            font-size: 48px;
            margin-bottom: 5px;
            font-variant-numeric: tabular-nums;
            color: #f59e0b;
            font-weight: 900;
        }

        #modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
        }

        #modal h1 { font-size: 72px; margin-bottom: 10px; }
        #modal button {
            padding: 15px 50px;
            font-size: 24px;
            cursor: pointer;
            background: #10b981;
            border: none;
            color: white;
            border-radius: 12px;
            font-weight: bold;
            transition: all 0.2s;
        }
        #modal button:hover { background: #059669; transform: scale(1.05); }

        .bonus-msg {
            position: absolute;
            bottom: -30px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            text-align: center;
            color: #10b981;
            min-height: 24px;
        }
.back-to-portal-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(5px);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-family: sans-serif;
            font-weight: bold;
            z-index: 9999;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .back-to-portal-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
            border-color: #f1c40f;
            color: #f1c40f;
        }
    </style>
</head>
<body onload="window.focus(); document.getElementById('gameCanvas').focus();">
<a href="index.html" class="back-to-portal-btn">🏠 חזרה לפורטל</a>
    <div id="timer">45</div>
    
    <div id="stats">
        <div class="p1-text">כחול: <span id="s1">0%</span></div>
        <div class="p2-text">אדום: <span id="s2">0%</span></div>
    </div>

    <div id="canvas-container">
        <canvas id="gameCanvas" tabindex="0"></canvas>
        <div id="bonusLabel" class="bonus-msg">לחצו על הלוח לתחילת משחק</div>
    </div>

    <div class="controls">
        <div><span class="p1-text">שחקן 1:</span> <span class="kbd">WASD</span></div>
        <div><span class="p2-text">שחקן 2:</span> <span class="kbd">חיצים</span></div>
    </div>

    <div id="modal">
        <h1 id="resultTitle">המשחק נגמר!</h1>
        <p id="resultDetails" style="font-size: 32px; margin-bottom: 40px;"></p>
        <button onclick="location.reload()">סיבוב נוסף</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const timerEl = document.getElementById('timer');
        const s1El = document.getElementById('s1');
        const s2El = document.getElementById('s2');
        const modal = document.getElementById('modal');
        const bonusLabel = document.getElementById('bonusLabel');

        const gridSize = 24;
        const cols = 35;
        const rows = 20;
        canvas.width = cols * gridSize;
        canvas.height = rows * gridSize;

        let grid = [];
        for(let i=0; i<cols; i++) {
            grid[i] = new Array(rows).fill(0);
        }

        let p1 = { x: 1, y: 1, color: '#38bdf8', speed: 85, lastMove: 0, powerEnd: 0 };
        let p2 = { x: cols-2, y: rows-2, color: '#fb7185', speed: 85, lastMove: 0, powerEnd: 0 };
        
        let bonuses = [];
        let timeLeft = 45;
        let gameRunning = true;

        // ניהול מקשים משופר
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            // מניעת גלילת הדף עם החיצים או הרווח
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space","Enter"].includes(e.code)) {
                e.preventDefault();
            }
            if(bonusLabel.innerText === "לחצו על הלוח לתחילת משחק") {
                bonusLabel.innerText = "";
            }
        });
        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // פוקוס אוטומטי בלחיצה
        canvas.addEventListener('click', () => {
            canvas.focus();
            bonusLabel.innerText = "";
        });

        function spawnBonus() {
            if (bonuses.length < 2 && Math.random() < 0.05) {
                const bx = Math.floor(Math.random() * cols);
                const by = Math.floor(Math.random() * rows);
                if (grid[bx][by] === 0) {
                    const types = ['SPEED', 'CLEAN', 'AREA'];
                    bonuses.push({ x: bx, y: by, type: types[Math.floor(Math.random()*types.length)] });
                }
            }
        }

        function applyBonus(player, type) {
            const now = Date.now();
            if (type === 'SPEED') {
                player.speed = 45;
                player.powerEnd = now + 5000;
                showBonusMsg("מהירות מוגברת!");
            } else if (type === 'CLEAN') {
                for(let i=0; i<cols; i++) {
                    for(let j=0; j<rows; j++) {
                        if (grid[i][j] !== (player === p1 ? 1 : 2)) {
                            if (Math.random() < 0.2) grid[i][j] = 0;
                        }
                    }
                }
                showBonusMsg("ניקוי שטח חלקי!");
            } else if (type === 'AREA') {
                for(let i=-2; i<=2; i++) {
                    for(let j=-2; j<=2; j++) {
                        let nx = player.x + i;
                        let ny = player.y + j;
                        if (isValid(nx, ny)) grid[nx][ny] = (player === p1 ? 1 : 2);
                    }
                }
                showBonusMsg("כיבוש שטח בזק!");
            }
        }

        function showBonusMsg(txt) {
            bonusLabel.innerText = txt;
            setTimeout(() => { if(bonusLabel.innerText === txt) bonusLabel.innerText = ""; }, 2000);
        }

        function update() {
            if (!gameRunning) return;
            const now = Date.now();
            
            [p1, p2].forEach(p => {
                if (now > p.powerEnd) p.speed = 85;
            });

            movePlayer(p1, 'KeyW', 'KeyS', 'KeyA', 'KeyD', 1, now);
            movePlayer(p2, 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 2, now);
            
            spawnBonus();
            checkBonuses();
        }

        function movePlayer(p, up, down, left, right, id, now) {
            if (now - p.lastMove > p.speed) {
                let dx = 0, dy = 0;
                if (keys[up]) dy = -1;
                else if (keys[down]) dy = 1;
                else if (keys[left]) dx = -1;
                else if (keys[right]) dx = 1;

                if (dx !== 0 || dy !== 0) {
                    let nx = p.x + dx;
                    let ny = p.y + dy;
                    if (isValid(nx, ny)) {
                        p.x = nx; p.y = ny;
                        grid[p.x][p.y] = id;
                        p.lastMove = now;
                    }
                }
            }
        }

        function checkBonuses() {
            bonuses = bonuses.filter(b => {
                if (p1.x === b.x && p1.y === b.y) { applyBonus(p1, b.type); return false; }
                if (p2.x === b.x && p2.y === b.y) { applyBonus(p2, b.type); return false; }
                return true;
            });
        }

        function isValid(x, y) { return x >= 0 && x < cols && y >= 0 && y < rows; }

        function draw() {
            ctx.fillStyle = '#020617';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // רשת רקע
            ctx.strokeStyle = '#0f172a';
            ctx.lineWidth = 1;
            for(let i=0; i<=cols; i++) {
                ctx.beginPath();
                ctx.moveTo(i*gridSize, 0);
                ctx.lineTo(i*gridSize, canvas.height);
                ctx.stroke();
            }
            for(let j=0; j<=rows; j++) {
                ctx.beginPath();
                ctx.moveTo(0, j*gridSize);
                ctx.lineTo(canvas.width, j*gridSize);
                ctx.stroke();
            }

            // ציור משבצות כבושות
            for(let i=0; i<cols; i++) {
                for(let j=0; j<rows; j++) {
                    if (grid[i][j] !== 0) {
                        ctx.fillStyle = grid[i][j] === 1 ? '#0c4a6e' : '#881337';
                        ctx.fillRect(i*gridSize + 1, j*gridSize + 1, gridSize-2, gridSize-2);
                        ctx.strokeStyle = grid[i][j] === 1 ? '#0ea5e9' : '#e11d48';
                        ctx.lineWidth = 0.5;
                        ctx.strokeRect(i*gridSize + 1, j*gridSize + 1, gridSize-2, gridSize-2);
                    }
                }
            }

            // ציור בונוסים
            bonuses.forEach(b => {
                ctx.fillStyle = '#f59e0b';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#f59e0b';
                ctx.beginPath();
                ctx.arc(b.x*gridSize + gridSize/2, b.y*gridSize + gridSize/2, gridSize/3, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.shadowBlur = 0;
            });

            // ציור שחקנים
            drawPlayer(p1);
            drawPlayer(p2);

            updateScores();
        }

        function drawPlayer(p) {
            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = p.color;
            ctx.fillStyle = "white";
            ctx.fillRect(p.x*gridSize, p.y*gridSize, gridSize, gridSize);
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 4;
            ctx.strokeRect(p.x*gridSize, p.y*gridSize, gridSize, gridSize);
            ctx.restore();
        }

        function updateScores() {
            let s1 = 0, s2 = 0;
            grid.forEach(col => col.forEach(cell => {
                if (cell === 1) s1++;
                if (cell === 2) s2++;
            }));
            const total = cols * rows;
            const p1p = ((s1/total)*100).toFixed(1);
            const p2p = ((s2/total)*100).toFixed(1);
            s1El.innerText = p1p + '%';
            s2El.innerText = p2p + '%';
            return { p1p, p2p };
        }

        const timerInterval = setInterval(() => {
            if (gameRunning) {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }
        }, 1000);

        function endGame() {
            gameRunning = false;
            clearInterval(timerInterval);
            const res = updateScores();
            modal.style.display = 'flex';
            if (parseFloat(res.p1p) > parseFloat(res.p2p)) {
                document.getElementById('resultTitle').innerText = 'הכחול ניצח!';
                document.getElementById('resultTitle').style.color = '#38bdf8';
            } else if (parseFloat(res.p2p) > parseFloat(res.p1p)) {
                document.getElementById('resultTitle').innerText = 'האדום ניצח!';
                document.getElementById('resultTitle').style.color = '#fb7185';
            } else {
                document.getElementById('resultTitle').innerText = 'תיקו מורט עצבים!';
                document.getElementById('resultTitle').style.color = 'white';
            }
            document.getElementById('resultDetails').innerText = `תוצאה סופית: ${res.p1p}% לעומת ${res.p2p}%`;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // אתחול
        grid[p1.x][p1.y] = 1;
        grid[p2.x][p2.y] = 2;
        gameLoop();
        canvas.focus(); // ניסיון לתת פוקוס ראשוני
    </script>
</body>
</html>
